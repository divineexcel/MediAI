name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies (CGO/SQLite)
        run: sudo apt-get install -y gcc libsqlite3-dev

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -timeout 120s -race

      - name: Verify build
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/server

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: medisave:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
