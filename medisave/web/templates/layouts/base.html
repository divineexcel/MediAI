\<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}MediSave{{end}}</title>

  <!-- TailwindCSS CDN (replaced with build in production) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   { DEFAULT: '#0F9D58', light: '#34A853', pale: '#E8F5E9' },
            medisave:  { green: '#0F9D58', teal: '#34A853', mint: '#E8F5E9' }
          },
          
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>


  <!-- AlpineJS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  {{block "head" .}}{{end}}
</head>
<body class="h-full bg-gray-50 font-sans text-gray-900 antialiased">

  {{block "body" .}}{{end}}

  {{block "scripts" .}}{{end}}
</body>
</html>
