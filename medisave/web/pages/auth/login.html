<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0F9D58',secondary:'#34A853',accent:'#E8F5E9'}}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 flex items-center justify-center p-4">

<div x-data="loginApp()" class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl shadow-lg mb-4">
      <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">MediSave</h1>
    <p class="text-gray-500 text-sm mt-1">Healthcare. Savings. Anywhere. Anytime.</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
    <h2 class="text-xl font-bold text-gray-900 mb-1">Welcome back</h2>
    <p class="text-gray-500 text-sm mb-6">Sign in to your MediSave account</p>

    <!-- Error -->
    <div x-show="error" x-transition
         class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2 text-red-700 text-sm">
      <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
      </svg>
      <span x-text="error"></span>
    </div>

    <form @submit.prevent="login" class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input x-model="form.email" type="email" placeholder="you@example.com" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition"/>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input x-model="form.password" :type="showPassword ? 'text' : 'password'" placeholder="••••••••" required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition pr-10"/>
          <button type="button" @click="showPassword=!showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg x-show="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg x-show="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" :disabled="loading"
        class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-primary/25 disabled:opacity-60 disabled:cursor-not-allowed">
        <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-100"></div>
      <span class="text-xs text-gray-400">OR</span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>

    <!-- Demo accounts -->
    <div class="space-y-2">
      <p class="text-xs text-center text-gray-400 mb-2">Quick demo login</p>
      <div class="grid grid-cols-2 gap-2">
        <button @click="fillDemo('patient')"
          class="py-2 px-3 text-xs font-medium bg-accent text-primary rounded-lg hover:bg-green-100 transition border border-green-200">
          Patient
        </button>
        <button @click="fillDemo('doctor')"
          class="py-2 px-3 text-xs font-medium bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 transition border border-blue-200">
          Doctor
        </button>
      </div>
    </div>
  </div>

  <!-- Register link -->
  <p class="text-center text-sm text-gray-500 mt-6">
    New to MediSave?
    <a href="/register" class="text-primary font-semibold hover:underline">Create account</a>
  </p>
</div>

<script>
function loginApp() {
  return {
    form: { email: '', password: '' },
    loading: false,
    error: '',
    showPassword: false,

    async login() {
      this.loading = true;
      this.error = '';
      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.form)
        });
        const data = await res.json();
        if (!data.success) { this.error = data.message; return; }

        localStorage.setItem('ms_token', data.data.tokens.access_token);
        localStorage.setItem('ms_refresh', data.data.tokens.refresh_token);
        localStorage.setItem('ms_user', JSON.stringify(data.data.user));

        const role = data.data.user.role;
        if (role === 'patient')  window.location.href = '/patient/dashboard';
        else if (role === 'doctor') window.location.href = '/doctor/dashboard';
        else window.location.href = '/admin/dashboard';
      } catch (e) {
        this.error = 'Network error. Please try again.';
      } finally {
        this.loading = false;
      }
    },

    fillDemo(role) {
      const accounts = {
        patient: { email: 'emeka@test.medisave.ng', password: 'Patient@MediSave2024' },
        doctor:  { email: 'dr.obi@medisave.ng',     password: 'Doctor@MediSave2024'  },
        admin:   { email: 'admin@medisave.ng',       password: 'Admin@MediSave2024'   },
      };
      this.form = accounts[role];
    }
  }
}
</script>
</body>
</html>
