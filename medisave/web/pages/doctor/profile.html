<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | MediSave Doctor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0F9D58',secondary:'#34A853',accent:'#E8F5E9'}}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;} .fi{@apply w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition;}</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="doctorProfileApp()" x-init="init()">

<div class="max-w-2xl mx-auto px-4 py-8 pb-24 lg:pb-8">
  <div class="flex items-center gap-4 mb-6">
    <a href="/doctor/dashboard" class="w-9 h-9 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-gray-500 hover:text-primary transition shadow-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div>
      <h1 class="text-xl font-bold text-gray-900">My Profile</h1>
      <p class="text-xs text-gray-400">Manage your professional information</p>
    </div>
  </div>

  <!-- Banners -->
  <div x-show="success" x-transition class="mb-4 p-3 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm flex items-center gap-2">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    Profile updated successfully.
  </div>
  <div x-show="error" x-transition class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm" x-text="error"></div>

  <!-- Avatar + status -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-4">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xl shrink-0"
        x-text="initials()"></div>
      <div>
        <p class="font-semibold text-gray-900" x-text="'Dr. ' + form.first_name + ' ' + form.last_name"></p>
        <p class="text-sm text-gray-400" x-text="form.specialty"></p>
        <div class="flex items-center gap-2 mt-1">
          <span x-show="status === 'verified'" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-accent text-primary">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            Verified
          </span>
          <span x-show="status === 'pending'" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-yellow-50 text-yellow-700">Pending Verification</span>
          <span x-show="status === 'suspended'" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-red-50 text-red-700">Suspended</span>
        </div>
      </div>
    </div>
  </div>

  <form @submit.prevent="save()" class="space-y-4">
    <!-- Personal Info -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <h2 class="font-semibold text-gray-900 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Personal Information
      </h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">First name</label>
          <input x-model="form.first_name" type="text" class="fi"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Last name</label>
          <input x-model="form.last_name" type="text" class="fi"/>
        </div>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Phone number</label>
        <input x-model="form.phone" type="tel" class="fi"/>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Email address</label>
        <input x-model="form.email" type="email" disabled class="fi bg-gray-50 cursor-not-allowed opacity-60"/>
        <p class="text-xs text-gray-400 mt-1">Email cannot be changed</p>
      </div>
    </div>

    <!-- Professional Info -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <h2 class="font-semibold text-gray-900 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        Professional Details
      </h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Specialty</label>
          <input x-model="form.specialty" type="text" disabled class="fi bg-gray-50 cursor-not-allowed opacity-60"/>
          <p class="text-xs text-gray-400 mt-1">Contact support to change</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Sub-specialty</label>
          <input x-model="form.sub_specialty" type="text" placeholder="e.g. Interventional Cardiology" class="fi"/>
        </div>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Hospital / Clinic</label>
        <input x-model="form.hospital" type="text" class="fi"/>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Consultation fee (₦)</label>
        <input x-model.number="form.consultation_fee" type="number" min="0" class="fi"/>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Languages spoken</label>
        <input x-model="form.languages" type="text" placeholder="e.g. English, Yoruba, Igbo" class="fi"/>
      </div>
    </div>

    <!-- Bio & Credentials -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <h2 class="font-semibold text-gray-900 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Bio & Credentials
      </h2>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">About me (Bio)</label>
        <textarea x-model="form.bio" rows="4" placeholder="Tell patients about yourself, your approach to care..." class="fi resize-none"></textarea>
        <p class="text-xs text-gray-400 mt-1" x-text="(form.bio?.length || 0) + '/1000 characters'"></p>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Education & Training</label>
        <textarea x-model="form.education" rows="2" placeholder="MBBS, University of Lagos, 2015..." class="fi resize-none"></textarea>
      </div>
      <div class="mt-4">
        <label class="block text-xs font-medium text-gray-500 mb-1">Certifications</label>
        <textarea x-model="form.certifications" rows="2" placeholder="Fellow, West African College of Surgeons..." class="fi resize-none"></textarea>
      </div>
    </div>

    <!-- Save -->
    <button type="submit" :disabled="saving"
      class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-primary/25 disabled:opacity-60 flex items-center justify-center gap-2">
      <svg x-show="saving" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span x-text="saving ? 'Saving...' : 'Save Changes'"></span>
    </button>
  </form>

  <!-- Change Password -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mt-4">
    <h2 class="font-semibold text-gray-900 mb-4 flex items-center gap-2">
      <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Change Password
    </h2>
    <div class="space-y-3">
      <input x-model="pw.current" type="password" placeholder="Current password" class="fi"/>
      <input x-model="pw.new" type="password" placeholder="New password (min. 8 chars)" class="fi"/>
      <button @click="changePassword()"
        class="w-full bg-gray-900 hover:bg-gray-700 text-white font-semibold py-3 rounded-xl transition text-sm">
        Update Password
      </button>
    </div>
  </div>

  <div class="mt-6">
    <button @click="logout()" class="w-full flex items-center justify-center gap-2 py-3 border border-red-200 rounded-xl text-red-600 hover:bg-red-50 transition text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sign out
    </button>
  </div>
</div>

<script>
function doctorProfileApp() {
  return {
    form: { first_name:'',last_name:'',email:'',phone:'',specialty:'',sub_specialty:'',hospital:'',consultation_fee:0,languages:'',bio:'',education:'',certifications:'' },
    pw: { current:'', new:'' },
    status: 'pending',
    saving: false, success: false, error: '',

    async init() {
      const token = localStorage.getItem('ms_token');
      if (!token) { window.location.href = '/login'; return; }
      try {
        const res = await fetch('/api/v1/doctors/me/profile', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        if (data.success) {
          const d = data.data;
          this.status = d.status;
          this.form = {
            first_name: d.user?.first_name || '',
            last_name: d.user?.last_name || '',
            email: d.user?.email || '',
            phone: d.user?.phone || '',
            specialty: d.specialty || '',
            sub_specialty: d.sub_specialty || '',
            hospital: d.hospital || '',
            consultation_fee: d.consultation_fee || 0,
            languages: d.languages || '',
            bio: d.bio || '',
            education: d.education || '',
            certifications: d.certifications || ''
          };
        }
      } catch(e) { console.error(e); }
    },

    async save() {
      this.saving = true; this.success = false; this.error = '';
      try {
        const token = localStorage.getItem('ms_token');
        const res = await fetch('/api/v1/doctors/me/profile', {
          method: 'PUT',
          headers: { 'Authorization':'Bearer '+token, 'Content-Type':'application/json' },
          body: JSON.stringify({
            first_name: this.form.first_name,
            last_name: this.form.last_name,
            phone: this.form.phone,
            sub_specialty: this.form.sub_specialty,
            hospital: this.form.hospital,
            consultation_fee: this.form.consultation_fee,
            languages: this.form.languages,
            bio: this.form.bio,
            education: this.form.education,
            certifications: this.form.certifications
          })
        });
        const data = await res.json();
        if (data.success) {
          this.success = true;
          const stored = JSON.parse(localStorage.getItem('ms_user') || '{}');
          stored.first_name = this.form.first_name;
          stored.last_name = this.form.last_name;
          localStorage.setItem('ms_user', JSON.stringify(stored));
          setTimeout(() => this.success = false, 3000);
        } else {
          this.error = data.message || 'Update failed';
        }
      } catch(e) { this.error = 'Network error.'; }
      finally { this.saving = false; }
    },

    async changePassword() {
      if (!this.pw.current || !this.pw.new) { this.error = 'Fill both password fields.'; return; }
      try {
        const token = localStorage.getItem('ms_token');
        const res = await fetch('/api/v1/auth/change-password', {
          method: 'POST',
          headers: { 'Authorization':'Bearer '+token, 'Content-Type':'application/json' },
          body: JSON.stringify({ current_password: this.pw.current, new_password: this.pw.new })
        });
        const data = await res.json();
        if (data.success) { this.success = true; this.pw = {current:'',new:''}; }
        else { this.error = data.message; }
      } catch(e) { this.error = 'Network error.'; }
    },

    initials() {
      return ((this.form.first_name[0]||'') + (this.form.last_name[0]||'')).toUpperCase() || 'Dr';
    },

    logout() { localStorage.clear(); window.location.href = '/login'; }
  }
}
</script>
</body>
</html>
