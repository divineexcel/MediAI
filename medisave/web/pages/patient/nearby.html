<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Nearby — MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0F9D58',secondary:'#34A853',accent:'#E8F5E9'}}}}</script>
  <!-- Leaflet must load before Alpine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
    #nearby-map { height: 270px; width: 100%; z-index: 1; }
    [x-cloak] { display: none !important; }
    .bnav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex: 1; padding: 9px 4px 6px; color: #9CA3AF; font-size: 10px;
      font-weight: 500; background: none; border: none; cursor: pointer;
      transition: color .15s; -webkit-tap-highlight-color: transparent;
    }
    .bnav-btn.active { color: #0F9D58; }
    .leaflet-popup-content-wrapper { border-radius: 14px !important; font-family: 'Inter', sans-serif !important; box-shadow: 0 8px 24px rgba(0,0,0,.15) !important; }
    .leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; line-height: 1.5; }
    .leaflet-popup-tip { display: none; }
    .leaflet-container { font-family: 'Inter', sans-serif; }
    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="nearbyApp()" x-init="init()" id="nearby-body" x-cloak>

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-100 px-4 py-4 flex items-center justify-between sticky top-0 z-40 shadow-sm">
    <div class="flex items-center gap-3">
      <a href="/patient/dashboard" class="w-9 h-9 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-gray-500 hover:text-primary transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <span class="font-bold text-gray-900 text-base">Find Nearby Care</span>
    </div>
    <div class="flex items-center gap-2 text-xs text-gray-400">
      <div class="w-2 h-2 rounded-full" :class="lat ? 'bg-green-500' : 'bg-gray-300'"></div>
      <span x-text="lat ? 'Located' : 'Locating…'"></span>
    </div>
  </nav>

  <!-- ── REAL LEAFLET MAP ── -->
  <div class="relative">
    <div id="nearby-map"></div>

    <!-- Searching overlay pill -->
    <div x-show="searching" class="absolute bottom-3 left-1/2 -translate-x-1/2 z-[999] pointer-events-none">
      <div class="bg-white rounded-full px-4 py-2 shadow-lg text-xs font-semibold text-gray-700 flex items-center gap-2">
        <svg class="animate-spin w-3.5 h-3.5 text-primary" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        Searching all facilities…
      </div>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-4 space-y-4 pb-28">

    <!-- FILTER BAR -->
    <div class="bg-white rounded-2xl p-4 shadow-sm space-y-3">
      <!-- Location row -->
      <div class="flex items-center gap-2 text-xs text-gray-500">
        <svg class="w-3.5 h-3.5 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span x-text="locationLabel" class="truncate flex-1"></span>
        <button @click="getLocation()" class="text-blue-600 font-semibold hover:underline shrink-0">Refresh</button>
      </div>

      <!-- Type filter chips -->
      <div class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width:none;-webkit-overflow-scrolling:touch">
        <template x-for="t in types" :key="t.value">
          <button
            @click="selectedType = t.value; filterMarkers()"
            class="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shrink-0 transition-all active:scale-95"
            :style="selectedType === t.value
              ? 'background:' + t.color + ';color:#fff;box-shadow:0 2px 8px ' + t.color + '55'
              : 'background:#F3F4F6;color:#4B5563'"
            x-text="t.label"
          ></button>
        </template>
      </div>

      <!-- Result count -->
      <p class="text-[11px] text-gray-400" x-show="searched && !searching">
        <span x-text="filteredPlaces().length"></span> facilities found
        <span x-show="selectedType !== 'all'"> · <button @click="selectedType='all'; filterMarkers()" class="text-primary underline">show all</button></span>
      </p>
    </div>

    <!-- Skeleton loader -->
    <div x-show="searching" class="space-y-3">
      <template x-for="i in 5" :key="i">
        <div class="bg-white rounded-2xl p-4 animate-pulse flex gap-3 items-start">
          <div class="w-11 h-11 bg-gray-100 rounded-xl shrink-0"></div>
          <div class="flex-1 space-y-2 pt-1">
            <div class="h-3.5 bg-gray-100 rounded w-40"></div>
            <div class="h-2.5 bg-gray-100 rounded w-28"></div>
            <div class="h-2.5 bg-gray-100 rounded w-20"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Empty state -->
    <div x-show="!searching && searched && filteredPlaces().length === 0" class="bg-white rounded-2xl p-10 text-center shadow-sm">
      <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <p class="text-sm font-semibold text-gray-700">No facilities found</p>
      <p class="text-xs text-gray-400 mt-1">Try switching to "All" or refreshing your location.</p>
    </div>

    <!-- FACILITY LIST -->
    <div x-show="!searching" class="space-y-3">
      <template x-for="place in filteredPlaces()" :key="place.place_id">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-transparent hover:border-primary/20 transition-all cursor-pointer active:scale-[0.99]"
             @click="openPlaceDetails(place)">
          <div class="flex items-start gap-3">

            <!-- Type icon bubble -->
            <div class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0 text-xl"
                 :style="'background:' + typeColorLight(place.type)">
              <span x-text="typeEmoji(place.type)"></span>
            </div>

            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-1.5">
                <h4 class="font-bold text-gray-900 text-sm leading-snug" x-text="place.name"></h4>
                <span class="text-xs font-bold text-primary shrink-0" x-text="place.distance"></span>
              </div>
              <p class="text-[11px] text-gray-500 mt-0.5 leading-snug" x-text="place.address"></p>
              <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                <span class="text-[10px] font-bold px-1.5 py-0.5 rounded-md"
                      :class="place.open_now ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'"
                      x-text="place.open_now ? '● Open now' : '● Closed'"></span>
                <span x-show="place.rating > 0" class="text-[10px] text-amber-500 font-semibold">
                  ★ <span x-text="place.rating.toFixed(1)"></span>
                </span>
                <span x-show="place.opening_hours" class="text-[10px] text-gray-400" x-text="place.opening_hours"></span>
              </div>
            </div>

            <!-- Location icon → opens Google Maps -->
            <button @click.stop="openOnGoogleMaps(place)"
              class="w-9 h-9 rounded-xl bg-blue-50 hover:bg-blue-100 active:bg-blue-200 flex items-center justify-center shrink-0 transition-colors"
              title="View on Google Maps">
              <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>

          </div>
        </div>
      </template>
    </div>

    <!-- EMERGENCY BANNER -->
    <div class="bg-red-50 border border-red-200 rounded-2xl p-4 flex items-center gap-3">
      <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="font-bold text-red-700 text-xs">Medical Emergency?</p>
        <p class="text-[10px] text-red-500 mt-0.5">Call 112 immediately or use SOS</p>
      </div>
      <div class="flex gap-2">
        <a href="tel:112" class="bg-red-600 text-white text-xs font-bold px-3 py-2 rounded-xl">Call 112</a>
        <a href="/patient/emergency" class="border border-red-300 text-red-600 text-xs font-bold px-3 py-2 rounded-xl">SOS</a>
      </div>
    </div>

  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] px-2"
    style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="flex justify-around items-center h-16">
      <a href="/patient/dashboard" class="bnav-btn">
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-[10px] font-semibold mt-0.5">Home</span>
      </a>
      <a href="/patient/appointments" class="bnav-btn">
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5">Consultations</span>
      </a>
      <a href="/patient/ai" class="bnav-btn">
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5">AI Assistant</span>
      </a>
      <a href="/patient/wallet" class="bnav-btn">
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5">Wallet</span>
      </a>
      <a href="/patient/profile" class="bnav-btn">
        <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5">Profile</span>
      </a>
    </div>
  </nav>

  <!-- Facility Details Bottom Sheet -->
  <div x-show="showPlaceSheet" x-cloak
    class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm"
    @click.self="showPlaceSheet = false">
    <div class="bg-white w-full max-w-md rounded-t-[28px] shadow-2xl pb-10 overflow-hidden"
         @click.stop style="max-height:85vh;overflow-y:auto">

      <!-- Drag handle -->
      <div class="sticky top-0 bg-white pt-3 pb-2 px-6">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-3"></div>
      </div>

      <template x-if="selectedPlace">
        <div class="px-6 pb-4 space-y-4">

          <!-- Header -->
          <div class="flex items-start gap-3">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl shrink-0"
                 :style="'background:' + typeColorLight(selectedPlace.type)">
              <span x-text="typeEmoji(selectedPlace.type)"></span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-extrabold text-gray-900 text-base leading-tight" x-text="selectedPlace.name"></h3>
              <p class="text-xs text-gray-500 mt-0.5" x-text="selectedPlace.address"></p>
              <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                <span class="text-[11px] font-bold px-2 py-0.5 rounded-lg"
                      :class="selectedPlace.open_now ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'"
                      x-text="selectedPlace.open_now ? 'Open Now' : 'Closed'"></span>
                <span x-show="selectedPlace.opening_hours" class="text-[11px] text-gray-400" x-text="selectedPlace.opening_hours"></span>
                <span x-show="selectedPlace.rating > 0" class="text-[11px] text-amber-500 font-bold">
                  ★ <span x-text="selectedPlace.rating.toFixed(1)"></span>
                </span>
                <span class="text-xs font-bold text-primary ml-auto" x-text="selectedPlace.distance"></span>
              </div>
            </div>
          </div>

          <!-- Phone -->
          <template x-if="selectedPlace.phone">
            <a :href="'tel:' + selectedPlace.phone"
               class="flex items-center gap-3 bg-gray-50 rounded-xl px-4 py-3 hover:bg-gray-100 transition-colors">
              <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <div>
                <p class="text-[10px] text-gray-400 font-medium">Phone</p>
                <p class="text-sm font-bold text-gray-900" x-text="selectedPlace.phone"></p>
              </div>
              <svg class="w-4 h-4 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>
          </template>

          <!-- Action buttons -->
          <div class="grid grid-cols-3 gap-2">
            <!-- Open in Google Maps -->
            <button @click="openOnGoogleMaps(selectedPlace)"
              class="flex flex-col items-center gap-1.5 bg-blue-50 hover:bg-blue-100 active:bg-blue-200 rounded-xl px-3 py-3 transition-colors">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <span class="text-[10px] font-bold text-blue-700">Google Maps</span>
            </button>

            <!-- Directions -->
            <button @click="getDirections(selectedPlace)"
              class="flex flex-col items-center gap-1.5 bg-primary hover:bg-secondary rounded-xl px-3 py-3 transition-colors">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
              </svg>
              <span class="text-[10px] font-bold text-white">Directions</span>
            </button>

            <!-- Book Doctor -->
            <button @click="bookAtHospital(selectedPlace)"
              class="flex flex-col items-center gap-1.5 bg-purple-50 hover:bg-purple-100 active:bg-purple-200 rounded-xl px-3 py-3 transition-colors">
              <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span class="text-[10px] font-bold text-purple-700">Book Doctor</span>
            </button>
          </div>

        </div>
      </template>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    const token = () => localStorage.getItem('ms_token');
    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() });

    function nearbyApp() {
      return {
        lat: null, lng: null,
        locationLabel: 'Acquiring your location…',
        selectedType: 'all',
        types: [
          { value: 'all',        label: '🗺 All',          color: '#374151' },
          { value: 'hospital',   label: '🏥 Hospital',     color: '#3B82F6' },
          { value: 'clinic',     label: '🏨 Clinic',       color: '#10B981' },
          { value: 'pharmacy',   label: '💊 Pharmacy',     color: '#8B5CF6' },
          { value: 'laboratory', label: '🔬 Laboratory',   color: '#F59E0B' },
          { value: 'blood_bank', label: '🩸 Blood Bank',   color: '#EF4444' },
        ],
        allPlaces: [],
        _markerMap: {},
        _userMarker: null,
        _map: null,
        searching: false,
        searched: false,
        selectedPlace: null,
        showPlaceSheet: false,

        filteredPlaces() {
          if (this.selectedType === 'all') return this.allPlaces;
          return this.allPlaces.filter(p => p.type === this.selectedType);
        },

        async init() {
          if (!token()) { window.location.href = '/login'; return; }
          this.initMap();
          await this.getLocation();
          document.getElementById('nearby-body').classList.remove('opacity-0');
        },

        initMap() {
          this._map = L.map('nearby-map', { zoomControl: false });
          L.control.zoom({ position: 'bottomright' }).addTo(this._map);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
            maxZoom: 19
          }).addTo(this._map);
          this._map.setView([9.0579, 7.4951], 13);
        },

        async getLocation() {
          this.locationLabel = 'Acquiring your location…';
          if (!navigator.geolocation) {
            this.lat = 9.0579; this.lng = 7.4951;
            this.locationLabel = 'Using Abuja default (geolocation not supported)';
            this._map.setView([this.lat, this.lng], 13);
            await this.searchAll();
            return;
          }
          try {
            const pos = await new Promise((res, rej) =>
              navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000, enableHighAccuracy: true })
            );
            this.lat = pos.coords.latitude;
            this.lng = pos.coords.longitude;
            this.locationLabel = `Your location (${this.lat.toFixed(4)}, ${this.lng.toFixed(4)})`;
          } catch {
            this.lat = 9.0579; this.lng = 7.4951;
            this.locationLabel = 'Using Abuja default (location unavailable)';
          }
          this._map.setView([this.lat, this.lng], 13);
          this.placeUserMarker();
          await this.searchAll();
        },

        placeUserMarker() {
          if (this._userMarker) this._map.removeLayer(this._userMarker);
          this._userMarker = L.circleMarker([this.lat, this.lng], {
            radius: 9, fillColor: '#3B82F6', color: 'white',
            weight: 3, opacity: 1, fillOpacity: 1
          }).addTo(this._map).bindPopup('<b style="font-family:Inter,sans-serif">📍 You are here</b>');
        },

        async searchAll() {
          this.searching = true;
          this.searched = true;
          const types = ['hospital', 'clinic', 'pharmacy', 'laboratory', 'blood_bank'];
          try {
            const results = await Promise.all(
              types.map(t =>
                fetch(`${API}/maps/nearby?lat=${this.lat}&lng=${this.lng}&type=${t}&radius=10000`, { headers: headers() })
                  .then(r => r.json())
                  .then(d => d.success ? (d.data || []) : [])
                  .catch(() => [])
              )
            );
            // Flatten, deduplicate by place_id, sort by distance
            const seen = new Set();
            const flat = results.flat().filter(p => {
              if (seen.has(p.place_id)) return false;
              seen.add(p.place_id);
              return true;
            });
            flat.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
            this.allPlaces = flat;
            this.updateMapMarkers();
          } finally {
            this.searching = false;
          }
        },

        updateMapMarkers() {
          // Remove old markers
          Object.values(this._markerMap).forEach(m => this._map.removeLayer(m));
          this._markerMap = {};

          const places = this.filteredPlaces();
          const validPlaces = places.filter(p => p.latitude && p.longitude);

          validPlaces.forEach(place => {
            const color = this.typeHex(place.type);
            const emoji = this.typeEmoji(place.type);
            const icon = L.divIcon({
              className: '',
              html: `<div style="width:34px;height:34px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer">${emoji}</div>`,
              iconSize: [34, 34],
              iconAnchor: [17, 17],
              popupAnchor: [0, -18]
            });

            const marker = L.marker([place.latitude, place.longitude], { icon })
              .addTo(this._map)
              .on('click', () => this.openPlaceDetails(place));

            marker.bindTooltip(
              `<b>${place.name}</b><br><span style="color:#6B7280">${place.distance}</span>`,
              { direction: 'top', offset: [0, -14], className: '' }
            );

            this._markerMap[place.place_id] = marker;
          });

          // Fit map to show all markers + user location
          if (validPlaces.length > 0) {
            const coords = validPlaces.map(p => [p.latitude, p.longitude]);
            if (this.lat && this.lng) coords.push([this.lat, this.lng]);
            this._map.fitBounds(L.latLngBounds(coords).pad(0.12), { maxZoom: 15 });
          }
        },

        filterMarkers() {
          this.updateMapMarkers();
        },

        openPlaceDetails(place) {
          this.selectedPlace = place;
          this.showPlaceSheet = true;
          if (place.latitude && place.longitude && this._map) {
            this._map.panTo([place.latitude, place.longitude], { animate: true });
          }
        },

        // Opens the facility's exact location in Google Maps
        openOnGoogleMaps(place) {
          const url = (place.latitude && place.longitude)
            ? `https://www.google.com/maps/search/?api=1&query=${place.latitude},${place.longitude}`
            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name + ' ' + place.address)}`;
          window.open(url, '_blank');
        },

        async getDirections(place) {
          try {
            const r = await fetch(
              `${API}/maps/directions?origin_lat=${this.lat}&origin_lng=${this.lng}&dest_lat=${place.latitude}&dest_lng=${place.longitude}`,
              { headers: headers() }
            );
            const d = await r.json();
            if (d.success && d.data?.url) window.open(d.data.url, '_blank');
          } catch {}
        },

        bookAtHospital(place) {
          window.location.href = `/patient/appointments?hospital=${encodeURIComponent(place.name)}`;
        },

        typeHex(type) {
          return { hospital: '#3B82F6', clinic: '#10B981', pharmacy: '#8B5CF6', laboratory: '#F59E0B', blood_bank: '#EF4444' }[type] || '#6B7280';
        },
        typeColorLight(type) {
          return { hospital: '#EFF6FF', clinic: '#F0FDF4', pharmacy: '#F5F3FF', laboratory: '#FFFBEB', blood_bank: '#FEF2F2' }[type] || '#F9FAFB';
        },
        typeEmoji(type) {
          return { hospital: '🏥', clinic: '🏨', pharmacy: '💊', laboratory: '🔬', blood_bank: '🩸' }[type] || '🏥';
        }
      };
    }
  </script>
<script src="/static/js/telemedicine.js"></script>
</body>
