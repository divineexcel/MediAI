<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Nearby — MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
  </style>
</head>
<body x-data="nearbyApp()" x-init="init()">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <span class="font-bold text-gray-900 text-lg">Find Nearby</span>
    </div>
    <a href="/patient/dashboard" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-6 space-y-5">

    <!-- SEARCH BAR -->
    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h2 class="font-bold text-gray-900 mb-4">Find Healthcare Facilities</h2>

      <!-- Type Filter -->
      <div class="flex gap-2 flex-wrap mb-4">
        <template x-for="t in types" :key="t.value">
          <button
            @click="selectedType = t.value; search()"
            class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
            :class="selectedType === t.value ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
            x-text="t.label"
          ></button>
        </template>
      </div>

      <!-- Location status -->
      <div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span x-text="locationLabel"></span>
        <button @click="getLocation()" class="text-blue-600 hover:underline text-xs ml-auto">Update Location</button>
      </div>

      <!-- Search button -->
      <button
        @click="search()"
        :disabled="!lat || searching"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors disabled:opacity-50 flex items-center justify-center gap-2"
      >
        <svg x-show="!searching" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <span x-show="!searching">Search Nearby</span>
        <span x-show="searching">Searching...</span>
      </button>
    </div>

    <!-- RESULTS -->
    <div x-show="searched">
      <div x-show="places.length === 0 && !searching" class="bg-white rounded-2xl p-8 text-center text-gray-400 shadow-sm">
        <svg class="w-14 h-14 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-sm font-medium">No facilities found nearby</p>
        <p class="text-xs mt-1">Try a different facility type or expand your search area.</p>
      </div>

      <div class="space-y-3">
        <template x-for="place in places" :key="place.place_id">
          <div class="bg-white rounded-2xl p-5 shadow-sm">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" :class="typeColor(place.type)">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <div>
                    <h4 class="font-semibold text-gray-900 text-sm leading-tight" x-text="place.name"></h4>
                    <p class="text-xs text-gray-500 mt-0.5" x-text="place.address"></p>
                  </div>
                  <div class="text-right flex-shrink-0">
                    <span class="text-sm font-semibold text-blue-600" x-text="place.distance"></span>
                  </div>
                </div>

                <div class="flex items-center gap-3 mt-2 flex-wrap">
                  <span class="text-xs" :class="place.open_now ? 'text-green-600' : 'text-red-500'" x-text="place.open_now ? '● Open now' : '● Closed'"></span>
                  <span x-show="place.opening_hours" class="text-xs text-gray-400" x-text="place.opening_hours"></span>
                  <span x-show="place.rating > 0" class="text-xs text-amber-500 flex items-center gap-0.5">
                    ★ <span x-text="place.rating.toFixed(1)"></span>
                  </span>
                </div>

                <div class="flex gap-2 mt-3">
                  <a x-show="place.phone" :href="'tel:' + place.phone"
                    class="flex items-center gap-1 text-xs bg-green-50 hover:bg-green-100 text-green-700 font-medium px-3 py-1.5 rounded-lg transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    Call
                  </a>
                  <button @click="getDirections(place)"
                    class="flex items-center gap-1 text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium px-3 py-1.5 rounded-lg transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                    Directions
                  </button>
                  <button @click="bookAtHospital(place)"
                    class="flex items-center gap-1 text-xs bg-purple-50 hover:bg-purple-100 text-purple-700 font-medium px-3 py-1.5 rounded-lg transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    Book Doctor
                  </button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- EMERGENCY BANNER -->
    <div class="bg-red-50 border border-red-200 rounded-2xl p-5 flex items-center gap-4">
      <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="font-semibold text-red-700 text-sm">Medical Emergency?</p>
        <p class="text-xs text-red-500 mt-0.5">Call 112 immediately or use SOS</p>
      </div>
      <div class="flex gap-2">
        <a href="tel:112" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition-colors">Call 112</a>
        <a href="/patient/emergency" class="border border-red-300 text-red-600 text-xs font-bold px-4 py-2 rounded-xl hover:bg-red-100 transition-colors">SOS</a>
      </div>
    </div>

  </div>

  <script>
    const API = '/api/v1';
    const token = () => localStorage.getItem('ms_token');
    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() });

    function nearbyApp() {
      return {
        lat: null, lng: null,
        locationLabel: 'Acquiring your location...',
        selectedType: 'hospital',
        types: [
          { value: 'hospital', label: '🏥 Hospital' },
          { value: 'clinic', label: '🏨 Clinic' },
          { value: 'pharmacy', label: '💊 Pharmacy' },
          { value: 'laboratory', label: '🔬 Laboratory' },
          { value: 'blood_bank', label: '🩸 Blood Bank' },
        ],
        places: [],
        searching: false,
        searched: false,

        async init() {
          if (!token()) { window.location.href = '/login'; return; }
          await this.getLocation();
        },

        async getLocation() {
          this.locationLabel = 'Acquiring your location...';
          if (!navigator.geolocation) {
            this.locationLabel = 'Geolocation not supported. Using Lagos default.';
            this.lat = 6.5244; this.lng = 3.3792;
            return;
          }
          try {
            const pos = await new Promise((res, rej) =>
              navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 })
            );
            this.lat = pos.coords.latitude;
            this.lng = pos.coords.longitude;
            this.locationLabel = `Your location (${this.lat.toFixed(4)}, ${this.lng.toFixed(4)})`;
            await this.search();
          } catch {
            this.lat = 6.5244; this.lng = 3.3792;
            this.locationLabel = 'Using Lagos default (location unavailable)';
            await this.search();
          }
        },

        async search() {
          if (!this.lat) return;
          this.searching = true;
          this.searched = true;
          try {
            const r = await fetch(`${API}/maps/nearby?lat=${this.lat}&lng=${this.lng}&type=${this.selectedType}&radius=10000`, { headers: headers() });
            const d = await r.json();
            if (d.success) this.places = d.data || [];
            else this.places = [];
          } catch {
            this.places = [];
          } finally {
            this.searching = false;
          }
        },

        async getDirections(place) {
          try {
            const r = await fetch(`${API}/maps/directions?origin_lat=${this.lat}&origin_lng=${this.lng}&dest_lat=${place.latitude}&dest_lng=${place.longitude}`, { headers: headers() });
            const d = await r.json();
            if (d.success && d.data?.url) {
              window.open(d.data.url, '_blank');
            }
          } catch {}
        },

        bookAtHospital(place) {
          window.location.href = `/patient/appointments?hospital=${encodeURIComponent(place.name)}`;
        },

        typeColor(type) {
          const colors = {
            hospital: 'bg-blue-100 text-blue-600',
            clinic: 'bg-green-100 text-green-600',
            pharmacy: 'bg-purple-100 text-purple-600',
            laboratory: 'bg-orange-100 text-orange-600',
            blood_bank: 'bg-red-100 text-red-600',
          };
          return colors[type] || 'bg-gray-100 text-gray-600';
        }
      };
    }
  </script>
</body>
</html>
