<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Nearby — MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
    .bnav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex: 1; padding: 9px 4px 6px; color: #9CA3AF; font-size: 10px;
      font-weight: 500; background: none; border: none; cursor: pointer;
      transition: color .15s; -webkit-tap-highlight-color: transparent;
    }
    .bnav-btn.active { color: #0F9D58; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen opacity-0 transition-opacity duration-300 ease-out" x-data="nearbyApp()" x-init="init()" id="nearby-body">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-100 px-4 py-4 flex items-center sticky top-0 z-40 shadow-xs">
    <div class="flex items-center gap-4">
      <a href="/patient/dashboard" class="w-9 h-9 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-gray-500 hover:text-primary transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <span class="font-bold text-gray-900 text-base">Find Nearby Care</span>
    </div>
  </nav>

  <!-- Full-Width Interactive Map Visual -->
  <div class="w-full h-64 md:h-80 bg-blue-50 relative overflow-hidden border-b border-gray-200">
    <!-- Mock Map Graphic -->
    <div class="absolute inset-0 bg-[#E8ECE9] opacity-90">
      <!-- Water body -->
      <div class="absolute top-1/2 left-0 w-full h-12 bg-[#A5C9EB] transform -rotate-12"></div>
      <!-- Roads -->
      <div class="absolute top-0 left-1/3 w-8 h-full bg-white transform rotate-6 border-l border-r border-gray-300"></div>
      <div class="absolute top-1/4 left-0 w-full h-8 bg-white transform -rotate-6 border-t border-b border-gray-300"></div>
      <div class="absolute top-2/3 left-0 w-full h-8 bg-white transform rotate-3 border-t border-b border-gray-300"></div>
      <!-- Parks -->
      <div class="absolute top-10 left-10 w-24 h-24 bg-[#D0F0D0] rounded-full blur-xs"></div>
      <div class="absolute bottom-10 right-10 w-32 h-20 bg-[#D0F0D0] rounded-3xl blur-xs"></div>
    </div>
    
    <!-- Pulse User Location Pin -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
      <div class="w-4 h-4 bg-blue-600 rounded-full border-2 border-white shadow-lg animate-ping absolute"></div>
      <div class="w-4 h-4 bg-blue-600 rounded-full border-2 border-white shadow-lg relative"></div>
      <span class="bg-gray-900/90 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full mt-1.5 backdrop-blur-xs">You</span>
    </div>

    <!-- Hospital pins when search succeeds -->
    <template x-for="(place, idx) in places" :key="place.place_id">
      <button @click="openPlaceDetails(place)"
        class="absolute z-10 transition-transform active:scale-90 flex flex-col items-center"
        :style="'top:' + (35 + (idx * 15) % 45) + '%; left:' + (20 + (idx * 22) % 65) + '%;'">
        <div class="w-8 h-8 rounded-full bg-white shadow-md flex items-center justify-center border-2 border-blue-500 hover:bg-blue-50 transition-colors">
          <span class="text-xs">🏥</span>
        </div>
      </button>
    </template>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-5 space-y-5 pb-28">

    <!-- SEARCH BAR -->
    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h2 class="font-bold text-gray-900 mb-3 text-sm">Find Healthcare Facilities</h2>

      <!-- Type Filter -->
      <div class="flex gap-2 overflow-x-auto pb-1 mb-4 scrollbar-none" style="scrollbar-width:none">
        <template x-for="t in types" :key="t.value">
          <button
            @click="selectedType = t.value; search()"
            class="px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap active:scale-[0.98] min-h-[36px]"
            :class="selectedType === t.value ? 'bg-primary text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
            x-text="t.label"
          ></button>
        </template>
      </div>

      <!-- Location status -->
      <div class="flex items-center gap-2 text-xs text-gray-500 mb-4">
        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span x-text="locationLabel" class="truncate max-w-[200px]"></span>
        <button @click="getLocation()" class="text-blue-600 font-semibold hover:underline text-xs ml-auto">Update</button>
      </div>

      <!-- Search button -->
      <button
        @click="search()"
        :disabled="!lat || searching"
        class="w-full bg-primary hover:bg-secondary text-white font-bold py-3 rounded-xl active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2 min-h-[48px]"
      >
        <svg x-show="!searching" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <span x-show="!searching">Search Nearby</span>
        <span x-show="searching">Searching...</span>
      </button>
    </div>

    <!-- RESULTS -->
    <div x-show="searched">
      <div x-show="places.length === 0 && !searching" class="bg-white rounded-2xl p-8 text-center text-gray-400 shadow-sm">
        <svg class="w-14 h-14 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-sm font-medium">No facilities found nearby</p>
        <p class="text-xs mt-1">Try a different facility type or expand your search area.</p>
      </div>

      <div class="space-y-3">
        <template x-for="place in places" :key="place.place_id">
          <div @click="openPlaceDetails(place)" class="bg-white rounded-2xl p-5 shadow-sm active:scale-[0.98] transition-transform cursor-pointer hover:border-primary/30 border border-transparent">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" :class="typeColor(place.type)">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <div>
                    <h4 class="font-bold text-gray-900 text-sm leading-tight" x-text="place.name"></h4>
                    <p class="text-xs text-gray-500 mt-0.5" x-text="place.address"></p>
                  </div>
                  <div class="text-right flex-shrink-0">
                    <span class="text-sm font-semibold text-primary" x-text="place.distance"></span>
                  </div>
                </div>

                <div class="flex items-center gap-3 mt-2 flex-wrap">
                  <span class="text-xs" :class="place.open_now ? 'text-green-600' : 'text-red-500'" x-text="place.open_now ? '● Open now' : '● Closed'"></span>
                  <span x-show="place.opening_hours" class="text-xs text-gray-400" x-text="place.opening_hours"></span>
                  <span x-show="place.rating > 0" class="text-xs text-amber-500 flex items-center gap-0.5">
                    ★ <span x-text="place.rating.toFixed(1)"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    </div>

    <!-- EMERGENCY BANNER -->
    <div class="bg-red-50 border border-red-200 rounded-2xl p-5 flex items-center gap-4">
      <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="font-bold text-red-700 text-sm">Medical Emergency?</p>
        <p class="text-xs text-red-500 mt-0.5">Call 112 immediately or use SOS</p>
      </div>
      <div class="flex gap-2">
        <a href="tel:112" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded-xl transition-colors">Call 112</a>
        <a href="/patient/emergency" class="border border-red-300 text-red-600 text-xs font-bold px-3 py-2 rounded-xl hover:bg-red-100 transition-colors">SOS</a>
      </div>
    </div>

  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] px-2"
    style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="flex justify-around items-center h-16">
      <a href="/patient/dashboard" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Home</span>
      </a>
      <a href="/patient/appointments" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Consultations</span>
      </a>
      <a href="/patient/ai" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">AI Assistant</span>
      </a>
      <a href="/patient/wallet" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Wallet</span>
      </a>
      <a href="/patient/profile" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Profile</span>
      </a>
    </div>
  </nav>

  <!-- Facility Details Bottom Sheet -->
  <div x-show="showPlaceSheet" class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-xs" x-transition x-cloak @click.self="showPlaceSheet=false">
    <div class="bg-white w-full max-w-md rounded-t-[32px] shadow-2xl p-6 pb-10 flex flex-col space-y-4" @click.stop>
      <!-- Drag handle -->
      <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-2 shrink-0"></div>
      
      <template x-if="selectedPlace">
        <div>
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-extrabold text-gray-900 text-lg leading-tight" x-text="selectedPlace.name"></h3>
              <p class="text-xs text-gray-500 mt-1" x-text="selectedPlace.address"></p>
            </div>
            <span class="text-sm font-semibold text-primary shrink-0" x-text="selectedPlace.distance"></span>
          </div>

          <div class="flex items-center gap-3 mt-3 flex-wrap">
            <span class="text-xs font-semibold px-2 py-0.5 rounded-lg" :class="selectedPlace.open_now ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'" x-text="selectedPlace.open_now ? 'Open Now' : 'Closed'"></span>
            <span x-show="selectedPlace.opening_hours" class="text-xs text-gray-400" x-text="selectedPlace.opening_hours"></span>
            <span x-show="selectedPlace.rating > 0" class="text-xs text-amber-500 font-semibold flex items-center gap-0.5">
              ★ <span x-text="selectedPlace.rating.toFixed(1)"></span>
            </span>
          </div>

          <div class="border-t border-gray-100 my-4 pt-4 space-y-3">
            <template x-if="selectedPlace.phone">
              <p class="text-xs text-gray-600 flex items-center gap-2">
                <span>📞 Phone:</span>
                <a :href="'tel:' + selectedPlace.phone" class="text-primary font-bold hover:underline" x-text="selectedPlace.phone"></a>
              </p>
            </template>
            <p class="text-xs text-gray-600 flex items-center gap-2">
              <span>📍 Type:</span>
              <span class="capitalize" x-text="selectedPlace.type.replace(/_/g,' ')"></span>
            </p>
          </div>

          <div class="flex gap-3">
            <!-- Large Navigation Button -->
            <button @click="getDirections(selectedPlace); showPlaceSheet=false;"
              class="flex-[2] bg-primary hover:bg-secondary text-white font-bold py-3.5 rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 min-h-[48px]">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
              Get Directions
            </button>
            
            <button @click="bookAtHospital(selectedPlace)"
              class="flex-1 border border-primary text-primary font-bold py-3.5 rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 min-h-[48px] text-xs">
              Book Doctor
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    const token = () => localStorage.getItem('ms_token');
    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() });

    function nearbyApp() {
      return {
        lat: null, lng: null,
        locationLabel: 'Acquiring your location...',
        selectedType: 'hospital',
        selectedPlace: null,
        showPlaceSheet: false,
        types: [
          { value: 'hospital', label: '🏥 Hospital' },
          { value: 'clinic', label: '🏨 Clinic' },
          { value: 'pharmacy', label: '💊 Pharmacy' },
          { value: 'laboratory', label: '🔬 Laboratory' },
          { value: 'blood_bank', label: '🩸 Blood Bank' },
        ],
        places: [],
        searching: false,
        searched: false,

        async init() {
          if (!token()) { window.location.href = '/login'; return; }
          await this.getLocation();
          document.getElementById('nearby-body').classList.remove('opacity-0');
        },

        openPlaceDetails(place) {
          this.selectedPlace = place;
          this.showPlaceSheet = true;
        },

        async getLocation() {
          this.locationLabel = 'Acquiring your location...';
          if (!navigator.geolocation) {
            this.locationLabel = 'Geolocation not supported. Using Abuja default.';
            this.lat = 9.0579; this.lng = 7.4951;
            return;
          }
          try {
            const pos = await new Promise((res, rej) =>
              navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 })
            );
            this.lat = pos.coords.latitude;
            this.lng = pos.coords.longitude;
            this.locationLabel = `Your location (${this.lat.toFixed(4)}, ${this.lng.toFixed(4)})`;
            await this.search();
          } catch {
            this.lat = 9.0579; this.lng = 7.4951;
            this.locationLabel = 'Using Abuja default (location unavailable)';
            await this.search();
          }
        },

        async search() {
          if (!this.lat) return;
          this.searching = true;
          this.searched = true;
          try {
            const r = await fetch(`${API}/maps/nearby?lat=${this.lat}&lng=${this.lng}&type=${this.selectedType}&radius=10000`, { headers: headers() });
            const d = await r.json();
            if (d.success) this.places = d.data || [];
            else this.places = [];
          } catch {
            this.places = [];
          } finally {
            this.searching = false;
          }
        },

        async getDirections(place) {
          try {
            const r = await fetch(`${API}/maps/directions?origin_lat=${this.lat}&origin_lng=${this.lng}&dest_lat=${place.latitude}&dest_lng=${place.longitude}`, { headers: headers() });
            const d = await r.json();
            if (d.success && d.data?.url) {
              window.open(d.data.url, '_blank');
            }
          } catch {}
        },

        bookAtHospital(place) {
          window.location.href = `/patient/appointments?hospital=${encodeURIComponent(place.name)}`;
        },

        typeColor(type) {
          const colors = {
            hospital: 'bg-blue-100 text-blue-600',
            clinic: 'bg-green-100 text-green-600',
            pharmacy: 'bg-purple-100 text-purple-600',
            laboratory: 'bg-orange-100 text-orange-600',
            blood_bank: 'bg-red-100 text-red-600',
          };
          return colors[type] || 'bg-gray-100 text-gray-600';
        }
      };
    }
  </script>
</body>
</html>
