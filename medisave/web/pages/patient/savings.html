<!DOCTYPE html>
<html lang="en">
<head>

  <title>Health Savings | MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0F9D58',secondary:'#34A853',accent:'#E8F5E9'}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <h1 class="text-xl font-bold text-gray-900">Health Savings Goals</h1>
