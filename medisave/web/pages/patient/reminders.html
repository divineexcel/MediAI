<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medication Reminders — MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
    .freq-once        { background: #EDE9FE; color: #7C3AED; }
    .freq-daily       { background: #D1FAE5; color: #059669; }
    .freq-twice_daily { background: #DBEAFE; color: #2563EB; }
    .freq-three_times_daily { background: #FEF3C7; color: #D97706; }
    .freq-weekly      { background: #FCE7F3; color: #DB2777; }
    .bnav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex: 1; padding: 9px 4px 6px; color: #9CA3AF; font-size: 10px;
      font-weight: 500; background: none; border: none; cursor: pointer;
      transition: color .15s; -webkit-tap-highlight-color: transparent;
    }
    .bnav-btn.active { color: #0F9D58; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen opacity-0 transition-opacity duration-300 ease-out" x-data="remindersApp()" x-init="init()" id="reminders-body">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-100 px-4 py-4 flex items-center sticky top-0 z-40 shadow-xs">
    <div class="flex items-center gap-4">
      <a href="/patient/dashboard" class="w-9 h-9 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-gray-500 hover:text-primary transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <span class="font-bold text-gray-900 text-base">Medication Reminders</span>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- ADHERENCE CARD -->
    <div class="bg-gradient-to-br from-green-600 to-green-700 rounded-2xl p-6 text-white">
      <p class="text-green-100 text-sm font-medium mb-1">Medication Adherence</p>
      <div class="flex items-end gap-2 mb-4">
        <span class="text-5xl font-extrabold" x-text="analytics ? analytics.adherence_rate.toFixed(0) + '%' : '--'"></span>
        <span class="text-green-200 text-sm mb-2">this period</span>
      </div>
      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="bg-white/10 rounded-xl p-3">
          <div class="text-2xl font-bold" x-text="analytics?.taken_doses ?? 0"></div>
          <div class="text-xs text-green-200 mt-0.5">Taken</div>
        </div>
        <div class="bg-white/10 rounded-xl p-3">
          <div class="text-2xl font-bold" x-text="analytics?.skipped_doses ?? 0"></div>
          <div class="text-xs text-green-200 mt-0.5">Skipped</div>
        </div>
        <div class="bg-white/10 rounded-xl p-3">
          <div class="text-2xl font-bold" x-text="analytics?.missed_doses ?? 0"></div>
          <div class="text-xs text-green-200 mt-0.5">Missed</div>
        </div>
      </div>
    </div>

    <!-- REMINDERS LIST -->
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-bold text-gray-900">My Medications</h3>
        <button @click="openCreate()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl active:scale-[0.98] transition-all flex items-center gap-2 min-h-[40px]">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add Reminder
        </button>
      </div>

      <div x-show="loading" class="text-center py-10 text-gray-400">Loading...</div>

      <div x-show="!loading && reminders.length === 0" class="text-center py-10 text-gray-400">
        <svg class="w-14 h-14 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p class="text-sm font-medium">No medication reminders</p>
        <p class="text-xs mt-1">Add your first medication reminder to get started.</p>
      </div>

      <div class="space-y-4" x-show="!loading">
        <template x-for="rem in reminders" :key="rem.id">
          <div class="border border-gray-100 rounded-xl p-4">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <h4 class="font-semibold text-gray-900" x-text="rem.medicine_name"></h4>
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="'freq-' + rem.frequency" x-text="formatFreq(rem.frequency)"></span>
                  <span x-show="!rem.is_active" class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">Inactive</span>
                </div>
                <p class="text-sm text-gray-600" x-text="rem.dosage"></p>
                <p class="text-xs text-gray-400 mt-1" x-text="formatDateRange(rem.start_date, rem.end_date)"></p>

                <!-- Times -->
                <div class="flex gap-3 mt-2 flex-wrap">
                  <span x-show="rem.morning_time" class="flex items-center gap-1 text-xs text-amber-600 bg-amber-50 px-2 py-1 rounded-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1M4.22 4.22l.707.707M18.364 18.364l.707.707M3 12H2m20 0h-1M4.93 19.07l.707-.707M17.657 5.343l.707-.707"/></svg>
                    <span x-text="rem.morning_time"></span>
                  </span>
                  <span x-show="rem.afternoon_time" class="flex items-center gap-1 text-xs text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1M4.22 4.22l.707.707M18.364 18.364l.707.707M3 12H2m20 0h-1M4.93 19.07l.707-.707M17.657 5.343l.707-.707"/></svg>
                    <span x-text="rem.afternoon_time"></span>
                  </span>
                  <span x-show="rem.night_time" class="flex items-center gap-1 text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <span x-text="rem.night_time"></span>
                  </span>
                </div>

                <p x-show="rem.instructions" class="text-xs text-gray-400 mt-2 italic" x-text="rem.instructions"></p>
              </div>
              <div class="flex flex-col gap-2 items-end">
                <div x-show="rem.is_active" class="flex gap-2">
                  <button @click="logAction(rem.id, 'taken')" class="text-xs bg-green-100 hover:bg-green-200 text-green-700 font-bold px-3 py-2 rounded-xl active:scale-[0.98] transition-all min-h-[36px]">✓ Taken</button>
                  <button @click="logAction(rem.id, 'skipped')" class="text-xs bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold px-3 py-2 rounded-xl active:scale-[0.98] transition-all min-h-[36px]">Skip</button>
                </div>
                <div class="flex gap-2">
                  <button @click="openEdit(rem)" class="text-gray-400 hover:text-blue-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                  </button>
                  <button x-show="rem.is_active" @click="deactivate(rem.id)" class="text-gray-400 hover:text-red-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
      </div>
    </div>

  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] px-2"
    style="padding-bottom:env(safe-area-inset-bottom)">
    <div class="flex justify-around items-center h-16">
      <a href="/patient/dashboard" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Home</span>
      </a>
      <a href="/patient/appointments" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Consultations</span>
      </a>
      <a href="/patient/ai" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">AI Assistant</span>
      </a>
      <a href="/patient/wallet" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Wallet</span>
      </a>
      <a href="/patient/profile" class="bnav-btn">
        <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Profile</span>
      </a>
    </div>
  </nav>

  <!-- CREATE/EDIT MODAL -->
  <div x-show="modal.open" class="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 overflow-y-auto" x-transition>
    <div class="bg-white rounded-t-[32px] sm:rounded-2xl w-full max-w-md p-6 pb-10 sm:pb-6 my-4 shadow-2xl" @click.stop>
      <div class="sm:hidden w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4 shrink-0"></div>
      <h3 class="font-bold text-gray-900 mb-5" x-text="modal.editing ? 'Edit Reminder' : 'Add Medication Reminder'"></h3>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Medicine Name *</label>
          <input x-model="modal.medicine_name" type="text" placeholder="e.g. Paracetamol 500mg"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[48px]" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Dosage *</label>
          <input x-model="modal.dosage" type="text" placeholder="e.g. 1 tablet"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[48px]" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Frequency *</label>
          <select x-model="modal.frequency"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white min-h-[48px]">
            <option value="">Select frequency</option>
            <option value="once">Once</option>
            <option value="daily">Once Daily</option>
            <option value="twice_daily">Twice Daily</option>
            <option value="three_times_daily">Three Times Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Morning</label>
            <input x-model="modal.morning_time" type="time"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[40px]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Afternoon</label>
            <input x-model="modal.afternoon_time" type="time"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[40px]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Night</label>
            <input x-model="modal.night_time" type="time"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[40px]" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Start Date *</label>
            <input x-model="modal.start_date" type="date"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[48px]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">End Date *</label>
            <input x-model="modal.end_date" type="date"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 min-h-[48px]" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Instructions</label>
          <textarea x-model="modal.instructions" rows="2" placeholder="e.g. Take after meals"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
        </div>
      </div>

      <div x-show="modal.error" class="mt-4 text-sm text-red-600 bg-red-50 rounded-lg px-4 py-2" x-text="modal.error"></div>

      <div class="flex gap-3 mt-6">
        <button @click="modal.open = false" class="flex-1 border border-gray-200 text-gray-700 font-semibold py-3.5 rounded-xl hover:bg-gray-50 active:scale-[0.98] transition-all min-h-[48px]">Cancel</button>
        <button @click="saveReminder()" :disabled="modal.busy" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3.5 rounded-xl active:scale-[0.98] transition-all disabled:opacity-50 min-h-[48px]">
          <span x-show="!modal.busy" x-text="modal.editing ? 'Save Changes' : 'Add Reminder'"></span>
          <span x-show="modal.busy">Saving...</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    const token = () => localStorage.getItem('ms_token');
    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() });
    const today = () => new Date().toISOString().split('T')[0];

    function remindersApp() {
      return {
        reminders: [],
        analytics: null,
        loading: true,
        modal: { open: false, editing: false, id: null, medicine_name: '', dosage: '', frequency: '', morning_time: '', afternoon_time: '', night_time: '', start_date: today(), end_date: '', instructions: '', error: '', busy: false },

        async init() {
          if (!token()) { window.location.href = '/login'; return; }
          await Promise.all([this.fetchReminders(), this.fetchAnalytics()]);
          document.getElementById('reminders-body').classList.remove('opacity-0');
        },

        async fetchReminders() {
          this.loading = true;
          try {
            const r = await fetch(`${API}/reminders`, { headers: headers() });
            const d = await r.json();
            if (d.success) this.reminders = d.data?.items || d.data || [];
          } finally {
            this.loading = false;
          }
        },

        async fetchAnalytics() {
          try {
            const r = await fetch(`${API}/reminders/analytics`, { headers: headers() });
            const d = await r.json();
            if (d.success) this.analytics = d.data;
          } catch {}
        },

        openCreate() {
          this.modal = { open: true, editing: false, id: null, medicine_name: '', dosage: '', frequency: 'daily', morning_time: '08:00', afternoon_time: '', night_time: '', start_date: today(), end_date: '', instructions: '', error: '', busy: false };
        },

        openEdit(rem) {
          this.modal = {
            open: true, editing: true, id: rem.id,
            medicine_name: rem.medicine_name, dosage: rem.dosage, frequency: rem.frequency,
            morning_time: rem.morning_time || '', afternoon_time: rem.afternoon_time || '', night_time: rem.night_time || '',
            start_date: rem.start_date?.split('T')[0] || today(),
            end_date: rem.end_date?.split('T')[0] || '',
            instructions: rem.instructions || '', error: '', busy: false
          };
        },

        async saveReminder() {
          const m = this.modal;
          if (!m.medicine_name.trim() || !m.dosage.trim() || !m.frequency || !m.start_date || !m.end_date) {
            m.error = 'Please fill all required fields.';
            return;
          }
          m.busy = true; m.error = '';
          try {
            const url = m.editing ? `${API}/reminders/${m.id}` : `${API}/reminders`;
            const method = m.editing ? 'PUT' : 'POST';
            const r = await fetch(url, {
              method,
              headers: headers(),
              body: JSON.stringify({ medicine_name: m.medicine_name, dosage: m.dosage, frequency: m.frequency, morning_time: m.morning_time, afternoon_time: m.afternoon_time, night_time: m.night_time, start_date: m.start_date, end_date: m.end_date, instructions: m.instructions })
            });
            const d = await r.json();
            if (d.success) {
              m.open = false;
              await this.fetchReminders();
            } else {
              m.error = d.message || 'Failed to save reminder.';
            }
          } finally {
            m.busy = false;
          }
        },

        async logAction(id, status) {
          try {
            const r = await fetch(`${API}/reminders/logs/${id}/action`, {
              method: 'POST',
              headers: headers(),
              body: JSON.stringify({ status })
            });
            const d = await r.json();
            if (d.success) {
              await this.fetchAnalytics();
              alert(`Medication marked as ${status}!`);
            }
          } catch {}
        },

        async deactivate(id) {
          if (!confirm('Stop this medication reminder?')) return;
          try {
            const r = await fetch(`${API}/reminders/${id}`, { method: 'DELETE', headers: headers() });
            const d = await r.json();
            if (d.success) await this.fetchReminders();
          } catch {}
        },

        formatFreq(f) {
          const map = { once: 'Once', daily: 'Daily', twice_daily: '2x Daily', three_times_daily: '3x Daily', weekly: 'Weekly' };
          return map[f] || f;
        },

        formatDateRange(start, end) {
          const s = new Date(start).toLocaleDateString('en-NG', { day: 'numeric', month: 'short' });
          const e = new Date(end).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' });
          return `${s} — ${e}`;
        }
      };
    }
  </script>
<script src="/static/js/telemedicine.js"></script>
</body>
</html>
