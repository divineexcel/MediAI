<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Records | MediSave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0F9D58',secondary:'#34A853',accent:'#E8F5E9'}}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;}[x-cloak]{display:none!important;}</style>
</head>
<body class="bg-gray-50 min-h-screen opacity-0 transition-opacity duration-300 ease-out" x-data="recordsApp()" x-init="init()" x-cloak id="records-body">

<!-- Add Record Modal -->
<div x-show="showAddModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50 backdrop-blur-sm animate-fade-in" @click.self="showAddModal=false">
  <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-3xl shadow-2xl overflow-hidden pb-10 sm:pb-0">
    <!-- Drag handle for mobile -->
    <div class="sm:hidden w-12 h-1.5 bg-gray-200 rounded-full mx-auto my-3 shrink-0"></div>
    
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-lg font-bold text-gray-900">Add Health Record</h2>
      <button @click="showAddModal=false" class="w-8 h-8 rounded-xl bg-gray-100 flex items-center justify-center text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Record Type *</label>
        <select x-model="addForm.record_type" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-white min-h-[48px]">
          <option value="">Select type...</option>
          <option value="consultation_note">Consultation Note</option>
          <option value="prescription">Prescription</option>
          <option value="lab_report">Lab Report</option>
          <option value="imaging">Imaging (X-ray, Scan, etc.)</option>
          <option value="vaccination">Vaccination</option>
          <option value="discharge_summary">Discharge Summary</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Title *</label>
        <input x-model="addForm.title" type="text" placeholder="e.g. Blood Test Results – March 2024"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-h-[48px]"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Date *</label>
        <input x-model="addForm.record_date" type="date"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-h-[48px]"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Description</label>
        <textarea x-model="addForm.description" rows="3" placeholder="Add notes or details..."
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary resize-none"></textarea>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">File URL</label>
        <input x-model="addForm.file_url" type="url" placeholder="https://... (optional)"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-h-[48px]"/>
      </div>
      <p x-show="addError" x-text="addError" class="text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3"></p>
    </div>
    <div class="p-6 border-t border-gray-100">
      <button @click="createRecord()" :disabled="addLoading || !addForm.record_type || !addForm.title || !addForm.record_date"
        class="w-full py-3.5 bg-primary text-white rounded-2xl font-bold text-sm hover:bg-secondary active:scale-[0.98] transition-all disabled:opacity-50 min-h-[48px] flex items-center justify-center">
        <span x-text="addLoading ? 'Saving...' : 'Save Record'"></span>
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="max-w-2xl mx-auto px-4 py-8 pb-28">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <a href="/patient/dashboard" class="w-9 h-9 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-gray-500 hover:text-primary transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <h1 class="text-xl font-bold text-gray-900">Health Records</h1>
    </div>
    <button @click="openAdd()" class="flex items-center gap-2 px-4 py-2.5 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-secondary transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Record
    </button>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 bg-gray-100 rounded-2xl p-1 mb-5">
    <button @click="activeTab='records'" :class="activeTab==='records'?'bg-white shadow-sm text-gray-900 font-semibold':'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-sm transition">Records</button>
    <button @click="activeTab='prescriptions'" :class="activeTab==='prescriptions'?'bg-white shadow-sm text-gray-900 font-semibold':'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-sm transition">Prescriptions</button>
  </div>

  <!-- RECORDS TAB -->
  <div x-show="activeTab==='records'">
    <!-- Type filter chips -->
    <div class="flex gap-2 overflow-x-auto pb-2 mb-4 scrollbar-none" style="scrollbar-width:none">
      <template x-for="t in recordTypes" :key="t.value">
        <button @click="typeFilter=t.value; fetchRecords()"
          :class="typeFilter===t.value ? 'bg-primary text-white' : 'bg-white text-gray-600 border border-gray-200'"
          class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap active:scale-[0.97] transition-all min-h-[38px] flex items-center" x-text="t.label"></button>
      </template>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="space-y-3">
      <template x-for="i in 3" :key="i">
        <div class="bg-white rounded-2xl border border-gray-100 p-5 animate-pulse">
          <div class="flex gap-4">
            <div class="w-12 h-12 bg-gray-100 rounded-2xl"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-100 rounded w-48"></div>
              <div class="h-3 bg-gray-100 rounded w-24"></div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Empty -->
    <div x-show="!loading && records.length===0" class="text-center py-16">
      <div class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <p class="font-semibold text-gray-900 mb-1">No records yet</p>
      <p class="text-sm text-gray-500 mb-4">Keep track of your health history by adding records</p>
      <button @click="openAdd()" class="px-5 py-2.5 bg-primary text-white rounded-xl text-sm font-semibold hover:bg-secondary transition">Add Your First Record</button>
    </div>

    <!-- Records list -->
    <div x-show="!loading" class="space-y-3">
      <template x-for="rec in records" :key="rec.id">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:border-primary/30 transition">
          <div class="flex items-start gap-4">
            <!-- Icon by type -->
            <div :class="typeColor(rec.record_type)" class="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2 mb-1">
                <p class="font-bold text-gray-900 text-sm leading-snug" x-text="rec.title"></p>
                <button @click="deleteRecord(rec)" class="text-gray-300 hover:text-red-500 transition flex-shrink-0 mt-0.5">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
              <div class="flex items-center gap-3 text-xs text-gray-500 mb-2">
                <span class="capitalize px-2 py-0.5 bg-gray-100 rounded-lg" x-text="rec.record_type.replace(/_/g,' ')"></span>
                <span x-text="formatDate(rec.record_date)"></span>
              </div>
              <p x-show="rec.description" class="text-xs text-gray-500 line-clamp-2" x-text="rec.description"></p>
              <a x-show="rec.file_url" :href="rec.file_url" target="_blank"
                class="mt-2 inline-flex items-center gap-1.5 text-xs text-primary font-semibold hover:underline">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                View File
              </a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- PRESCRIPTIONS TAB -->
  <div x-show="activeTab==='prescriptions'">
    <!-- Loading -->
    <div x-show="prescLoading" class="space-y-3">
      <template x-for="i in 3" :key="i">
        <div class="bg-white rounded-2xl border border-gray-100 p-5 animate-pulse h-24"></div>
      </template>
    </div>

    <!-- Empty -->
    <div x-show="!prescLoading && prescriptions.length===0" class="text-center py-16">
      <p class="text-gray-500 text-sm">No prescriptions yet. Prescriptions from doctor consultations will appear here.</p>
    </div>

    <!-- Prescriptions -->
    <div x-show="!prescLoading" class="space-y-3">
      <template x-for="p in prescriptions" :key="p.id">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div>
              <p class="font-bold text-gray-900 text-sm" x-text="p.medicine_name"></p>
              <p class="text-xs text-gray-500 mt-0.5" x-text="p.dosage+' · '+p.frequency+' · '+p.duration"></p>
            </div>
            <span :class="p.is_filled ? 'bg-green-50 text-green-700' : 'bg-yellow-50 text-yellow-700'"
              class="px-2.5 py-1 rounded-lg text-xs font-semibold whitespace-nowrap">
              <span x-text="p.is_filled ? '✓ Filled' : 'Pending'"></span>
            </span>
          </div>
          <p x-show="p.instructions" class="text-xs text-gray-500 mb-3" x-text="'Note: '+p.instructions"></p>
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400" x-text="'Prescribed: '+formatDate(p.created_at)"></p>
            <button x-show="!p.is_filled" @click="markFilled(p)"
              class="px-3 py-1.5 bg-primary text-white rounded-xl text-xs font-semibold hover:bg-secondary transition">
              Mark as Filled
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] px-2"
  style="padding-bottom:env(safe-area-inset-bottom)">
  <div class="flex justify-around items-center h-16">
    <a href="/patient/dashboard" class="bnav-btn">
      <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Home</span>
    </a>
    <a href="/patient/appointments" class="bnav-btn">
      <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Consultations</span>
    </a>
    <a href="/patient/ai" class="bnav-btn">
      <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      <span class="text-[10px] font-semibold mt-0.5 text-gray-400">AI Assistant</span>
    </a>
    <a href="/patient/wallet" class="bnav-btn">
      <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Wallet</span>
    </a>
    <a href="/patient/profile" class="bnav-btn">
      <svg class="w-[22px] h-[22px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-[10px] font-semibold mt-0.5 text-gray-400">Profile</span>
    </a>
  </div>
</nav>

<script>
function recordsApp() {
  return {
    activeTab: 'records',
    records: [], loading: true, typeFilter: '',
    prescriptions: [], prescLoading: false,
    showAddModal: false, addLoading: false, addError: '',
    addForm: { record_type: '', title: '', record_date: '', description: '', file_url: '' },
    recordTypes: [
      { value: '', label: 'All' },
      { value: 'consultation_note', label: 'Notes' },
      { value: 'prescription', label: 'Prescriptions' },
      { value: 'lab_report', label: 'Lab Reports' },
      { value: 'imaging', label: 'Imaging' },
      { value: 'vaccination', label: 'Vaccinations' },
      { value: 'discharge_summary', label: 'Discharge' },
    ],

    async init() {
      if (!localStorage.getItem('ms_token')) { window.location.href = '/login'; return; }
      await this.fetchRecords();
      await this.fetchPrescriptions();
      document.getElementById('records-body').classList.remove('opacity-0');
    },

    async fetchRecords() {
      this.loading = true;
      try {
        const params = new URLSearchParams({ page: 1, limit: 50 });
        if (this.typeFilter) params.set('record_type', this.typeFilter);
        const r = await this.api('GET', `/api/v1/records?${params}`);
        this.records = r.data || [];
      } catch(e) { this.records = []; }
      finally { this.loading = false; }
    },

    async fetchPrescriptions() {
      this.prescLoading = true;
      try {
        const r = await this.api('GET', '/api/v1/records/prescriptions?page=1&limit=50');
        this.prescriptions = r.data || [];
      } catch(e) { this.prescriptions = []; }
      finally { this.prescLoading = false; }
    },

    openAdd() {
      this.addForm = { record_type: '', title: '', record_date: new Date().toISOString().slice(0,10), description: '', file_url: '' };
      this.addError = '';
      this.showAddModal = true;
    },

    async createRecord() {
      this.addLoading = true; this.addError = '';
      try {
        await this.api('POST', '/api/v1/records', this.addForm);
        this.showAddModal = false;
        await this.fetchRecords();
      } catch(e) { this.addError = e.message || 'Failed to save record'; }
      finally { this.addLoading = false; }
    },

    async deleteRecord(rec) {
      if (!confirm(`Delete "${rec.title}"? This cannot be undone.`)) return;
      try {
        await this.api('DELETE', `/api/v1/records/${rec.id}`);
        this.records = this.records.filter(r => r.id !== rec.id);
      } catch(e) { alert(e.message || 'Failed to delete record'); }
    },

    async markFilled(p) {
      try {
        await this.api('PATCH', `/api/v1/records/prescriptions/${p.id}/fill`);
        p.is_filled = true;
      } catch(e) { alert(e.message || 'Failed to update prescription'); }
    },

    typeColor(type) {
      const map = {
        consultation_note: 'bg-blue-50 text-blue-600',
        prescription: 'bg-green-50 text-green-600',
        lab_report: 'bg-purple-50 text-purple-600',
        imaging: 'bg-orange-50 text-orange-600',
        vaccination: 'bg-teal-50 text-teal-600',
        discharge_summary: 'bg-red-50 text-red-600',
      };
      return map[type] || 'bg-gray-100 text-gray-600';
    },

    formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-NG', { dateStyle: 'medium' });
    },

    async api(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('ms_token') },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Request failed');
      return data;
    },
  };
}
</script>
</body>
</html>
